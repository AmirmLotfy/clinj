# Clinj configuration — edit toggles, then re-run. 1 = clean, 0 = skip.
# This file is sourced by bin/clinj.sh. Keep it valid shell (KEY=value, no spaces around =).

# ── Standard-safe categories (run every time) ─────────────────────────────────
CLEAN_NPM=1            # npm cache
CLEAN_PNPM=1           # pnpm store
CLEAN_YARN=1           # Yarn cache
CLEAN_PIP=1            # pip cache
CLEAN_HOMEBREW=1       # brew cleanup + downloads
CLEAN_GRADLE=1         # Gradle caches/daemon
CLEAN_COCOAPODS=1      # CocoaPods repos
CLEAN_PLAYWRIGHT=1     # Playwright browsers (re-download on next test)
CLEAN_BUILD_CACHES=1   # next-swc, node-gyp, tsc, go-build
CLEAN_USER_CACHE=1     # ~/.cache subdirs (node, deno, firebase, hf, uv…)
CLEAN_DOCKER=1         # docker dangling resources >72h
CLEAN_SIMULATORS=1     # iOS Simulator caches + delete unavailable
CLEAN_XCODE_DERIVED=1  # Xcode DerivedData
CLEAN_ELECTRON=1       # Cursor/Windsurf/Claude/Figma… cache dirs
CLEAN_CHROME=1         # Chrome per-profile caches (never passwords/bookmarks)
CLEAN_SYS_CACHES=1     # assorted ~/Library/Caches app caches + ShipIt
CLEAN_LOGS=1           # old *.log/*.old + DiagnosticReports
CLEAN_TEMP=1           # temporary items
CLEAN_TRASH=1          # empty ~/.Trash

# ── Aggressive items (only when --aggressive / "Deep Clean" is used) ──────────
AGG_CHROME_MODELS=1        # Chrome on-device ML model dirs (re-download)
AGG_XCODE_ARCHIVES=1       # Xcode Archives (rebuild to recreate)
AGG_XCODE_DEVICESUPPORT=1  # Xcode iOS DeviceSupport (re-fetched on device connect)
AGG_CLAUDE_VM_BUNDLES=0    # Claude sandbox VMs (13GB+!) — heavy re-download.
                           # Stays off even in --aggressive. Use --vm-bundles or set =1
                           # only if you accept re-downloading them on next sandbox use.

# ── Schedule (used by install.sh when (re)installing the LaunchAgent) ─────────
# One of: daily | 3day | weekly | off
CLINJ_SCHEDULE=daily
# Hour of day (0-23) for daily/weekly scheduled runs
CLINJ_SCHEDULE_HOUR=3

# Add your own Electron/Chromium apps here (bash array, space separated).
# Leave commented to use the built-in list.
# ELECTRON_APPS=(Cursor Windsurf Claude Figma "Your App")
