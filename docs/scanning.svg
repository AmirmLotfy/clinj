<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 700" font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="ico" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b50ee"/><stop offset="0.55" stop-color="#3082f2"/><stop offset="1" stop-color="#21c7d9"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/><stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="24" flood-color="#000" flood-opacity="0.40"/>
    </filter>
  </defs>

  <rect x="40" y="28" width="1040" height="644" rx="16" fill="#1c1c1e" filter="url(#shadow)"/>
  <circle cx="70" cy="52" r="6" fill="#ff5f57"/><circle cx="90" cy="52" r="6" fill="#febc2e"/><circle cx="110" cy="52" r="6" fill="#28c840"/>
  <text x="148" y="57" fill="#9a9aa0" font-size="13">Clinj</text>

  <rect x="64" y="80" width="30" height="30" rx="8" fill="url(#ico)"/>
  <path d="M79 84 l3 7 l7 3 l-7 3 l-3 7 l-3 -7 l-7 -3 l7 -3 z" fill="#fff"/>
  <text x="104" y="103" fill="#f2f2f4" font-size="20" font-weight="700">Clinj</text>
  <rect x="232" y="83" width="356" height="28" rx="7" fill="#2c2c2e"/>
  <rect x="455" y="85" width="131" height="24" rx="6" fill="#3b6ef6"/>
  <text x="270" y="101" fill="#cfcfd4" font-size="13" text-anchor="middle">Minimal</text>
  <text x="356" y="101" fill="#cfcfd4" font-size="13" text-anchor="middle">General</text>
  <text x="430" y="101" fill="#cfcfd4" font-size="13" text-anchor="middle">Designer</text>
  <text x="520" y="101" fill="#ffffff" font-size="13" font-weight="600" text-anchor="middle">Developer</text>
  <rect x="938" y="88" width="34" height="20" rx="10" fill="#3a3a3c"/><circle cx="948" cy="98" r="7" fill="#d8d8db"/>
  <text x="982" y="103" fill="#9a9aa0" font-size="13">Unknown</text>
  <circle cx="1052" cy="98" r="14" fill="#2c2c2e"/><path d="M1046 98 a6 6 0 1 1 2 4" fill="none" stroke="#bdbdc2" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="64" y1="128" x2="1056" y2="128" stroke="#2e2e30" stroke-width="1"/>

  <!-- scanning ring -->
  <g transform="translate(560,360)">
    <circle r="60" fill="none" stroke="#39393c" stroke-width="9"/>
    <circle r="60" fill="none" stroke="url(#accent)" stroke-width="9" stroke-linecap="round"
            stroke-dasharray="83 294" transform="rotate(-90)"/>
    <path d="M0 -30 l5.5 13 l13 5.5 l-13 5.5 l-5.5 13 l-5.5 -13 l-13 -5.5 l13 -5.5 z" fill="#5fb8f5"/>
  </g>
  <text x="560" y="468" fill="#ededf0" font-size="18" font-weight="700" text-anchor="middle">Scanning caches…</text>
  <text x="560" y="502" fill="#ededf0" font-size="20" font-weight="600" text-anchor="middle">47 items · 1.8 GB found</text>
  <text x="560" y="530" fill="#7d7d83" font-size="12.5" text-anchor="middle">Google/Chrome — Service Worker/CacheStorage</text>

  <line x1="64" y1="600" x2="1056" y2="600" stroke="#2e2e30" stroke-width="1"/>
  <text x="64" y="641" fill="#6a6a70" font-size="14">Scanning…</text>
  <rect x="792" y="622" width="96" height="30" rx="7" fill="#262628"/><text x="840" y="641" fill="#6a6a70" font-size="13" text-anchor="middle">Restore last</text>
  <rect x="896" y="622" width="78" height="30" rx="7" fill="#262628"/><text x="935" y="641" fill="#6a6a70" font-size="13" text-anchor="middle">Preview</text>
  <rect x="982" y="622" width="74" height="30" rx="7" fill="#2a3f6b"/><text x="1019" y="641" fill="#9fb6e8" font-size="13" font-weight="600" text-anchor="middle">Clean</text>
</svg>
