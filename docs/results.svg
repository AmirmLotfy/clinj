<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 700" font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="ico" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b50ee"/><stop offset="0.55" stop-color="#3082f2"/><stop offset="1" stop-color="#21c7d9"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/><stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="24" flood-color="#000" flood-opacity="0.40"/>
    </filter>
  </defs>

  <!-- window -->
  <rect x="40" y="28" width="1040" height="644" rx="16" fill="#1c1c1e" filter="url(#shadow)"/>
  <!-- traffic lights -->
  <circle cx="70" cy="52" r="6" fill="#ff5f57"/><circle cx="90" cy="52" r="6" fill="#febc2e"/><circle cx="110" cy="52" r="6" fill="#28c840"/>
  <text x="148" y="57" fill="#9a9aa0" font-size="13">Clinj</text>

  <!-- header -->
  <rect x="64" y="80" width="30" height="30" rx="8" fill="url(#ico)"/>
  <path d="M79 84 l3 7 l7 3 l-7 3 l-3 7 l-3 -7 l-7 -3 l7 -3 z" fill="#fff"/>
  <text x="104" y="103" fill="#f2f2f4" font-size="20" font-weight="700">Clinj</text>
  <!-- segmented profiles -->
  <rect x="232" y="83" width="356" height="28" rx="7" fill="#2c2c2e"/>
  <rect x="455" y="85" width="131" height="24" rx="6" fill="#3b6ef6"/>
  <text x="270" y="101" fill="#cfcfd4" font-size="13" text-anchor="middle">Minimal</text>
  <text x="356" y="101" fill="#cfcfd4" font-size="13" text-anchor="middle">General</text>
  <text x="430" y="101" fill="#cfcfd4" font-size="13" text-anchor="middle">Designer</text>
  <text x="520" y="101" fill="#ffffff" font-size="13" font-weight="600" text-anchor="middle">Developer</text>
  <!-- unknown toggle + rescan -->
  <rect x="938" y="88" width="34" height="20" rx="10" fill="#3a3a3c"/><circle cx="948" cy="98" r="7" fill="#d8d8db"/>
  <text x="982" y="103" fill="#9a9aa0" font-size="13">Unknown</text>
  <circle cx="1052" cy="98" r="14" fill="#2c2c2e"/><path d="M1046 98 a6 6 0 1 1 2 4" fill="none" stroke="#bdbdc2" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="64" y1="128" x2="1056" y2="128" stroke="#2e2e30" stroke-width="1"/>

  <!-- DEV-JS section -->
  <g font-size="13">
    <rect x="64" y="142" width="15" height="15" rx="4" fill="#3b6ef6"/><path d="M67 149 l2 2 l4 -4" stroke="#fff" stroke-width="1.6" fill="none"/>
    <text x="90" y="154" fill="#c9c9cf" font-size="12" font-weight="700" letter-spacing="0.5">DEV-JS</text>
    <text x="1056" y="154" fill="#7d7d83" text-anchor="end">568 MB</text>
  </g>
  <!-- rows -->
  <g font-size="14.5">
    <!-- row template repeated -->
    <g transform="translate(0,176)">
      <rect x="64" y="0" width="15" height="15" rx="4" fill="#3b6ef6"/><path d="M67 7 l2 2 l4 -4" stroke="#fff" stroke-width="1.6" fill="none"/>
      <text x="98" y="6" fill="#ededf0">Bun install cache</text>
      <text x="98" y="22" fill="#7d7d83" font-size="11.5">re-downloaded by bun</text>
      <rect x="966" y="-3" width="40" height="18" rx="9" fill="#1c3a26"/><text x="986" y="10" fill="#4ade80" font-size="11" text-anchor="middle">safe</text>
      <text x="1056" y="9" fill="#ededf0" text-anchor="end">568 MB</text>
    </g>
    <g transform="translate(0,216)">
      <rect x="64" y="0" width="15" height="15" rx="4" fill="#3b6ef6"/><path d="M67 7 l2 2 l4 -4" stroke="#fff" stroke-width="1.6" fill="none"/>
      <text x="98" y="6" fill="#ededf0">npm cache</text>
      <text x="98" y="22" fill="#7d7d83" font-size="11.5">re-downloaded on next install</text>
      <rect x="966" y="-3" width="40" height="18" rx="9" fill="#1c3a26"/><text x="986" y="10" fill="#4ade80" font-size="11" text-anchor="middle">safe</text>
      <text x="1056" y="9" fill="#ededf0" text-anchor="end">72 KB</text>
    </g>
    <g transform="translate(0,256)">
      <rect x="64" y="0" width="15" height="15" rx="4" fill="#3b6ef6"/><path d="M67 7 l2 2 l4 -4" stroke="#fff" stroke-width="1.6" fill="none"/>
      <text x="98" y="6" fill="#ededf0">Playwright browsers</text>
      <text x="98" y="22" fill="#7d7d83" font-size="11.5">re-downloaded on next test run</text>
      <rect x="966" y="-3" width="40" height="18" rx="9" fill="#1c3a26"/><text x="986" y="10" fill="#4ade80" font-size="11" text-anchor="middle">safe</text>
      <text x="1056" y="9" fill="#ededf0" text-anchor="end">539 MB</text>
    </g>
  </g>

  <!-- DEV-NATIVE section -->
  <g font-size="13">
    <rect x="64" y="306" width="15" height="15" rx="4" fill="#3b6ef6"/><path d="M67 313 l2 2 l4 -4" stroke="#fff" stroke-width="1.6" fill="none"/>
    <text x="90" y="318" fill="#c9c9cf" font-size="12" font-weight="700" letter-spacing="0.5">DEV-NATIVE</text>
    <text x="1056" y="318" fill="#7d7d83" text-anchor="end">817 MB</text>
