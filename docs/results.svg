      <text x="98" y="6" fill="#ededf0">JetBrains IDE caches</text>
      <text x="98" y="22" fill="#7d7d83" font-size="11.5">rebuilt by the IDE</text>
      <rect x="966" y="-3" width="40" height="18" rx="9" fill="#1c3a26"/><text x="986" y="10" fill="#4ade80" font-size="11" text-anchor="middle">safe</text>
      <text x="1056" y="9" fill="#ededf0" text-anchor="end">330 MB</text>
    </g>
  </g>

  <!-- BROWSERS section -->
  <g font-size="13">
    <rect x="64" y="430" width="15" height="15" rx="4" fill="#3b6ef6"/><path d="M67 437 l2 2 l4 -4" stroke="#fff" stroke-width="1.6" fill="none"/>
    <text x="90" y="442" fill="#c9c9cf" font-size="12" font-weight="700" letter-spacing="0.5">BROWSERS</text>
    <text x="1056" y="442" fill="#7d7d83" text-anchor="end">764 MB</text>
  </g>
  <g font-size="14.5">
    <g transform="translate(0,464)">
      <rect x="64" y="0" width="15" height="15" rx="4" fill="#3b6ef6"/><path d="M67 7 l2 2 l4 -4" stroke="#fff" stroke-width="1.6" fill="none"/>
      <text x="98" y="6" fill="#ededf0">Chrome Default — Service Worker/CacheStorage</text>
      <text x="98" y="22" fill="#7d7d83" font-size="11.5">rebuilt by browser</text>
      <rect x="966" y="-3" width="40" height="18" rx="9" fill="#1c3a26"/><text x="986" y="10" fill="#4ade80" font-size="11" text-anchor="middle">safe</text>
      <text x="1056" y="9" fill="#ededf0" text-anchor="end">466 MB</text>
    </g>
    <g transform="translate(0,504)">
      <rect x="64" y="0" width="15" height="15" rx="4" fill="#3b6ef6"/><path d="M67 7 l2 2 l4 -4" stroke="#fff" stroke-width="1.6" fill="none"/>
      <text x="98" y="6" fill="#ededf0">Chrome — optimization_guide_model_store</text>
      <text x="98" y="22" fill="#7d7d83" font-size="11.5">re-downloaded by browser</text>
      <rect x="952" y="-3" width="68" height="18" rx="9" fill="#3a3210"/><text x="986" y="10" fill="#facc15" font-size="10.5" text-anchor="middle">aggressive</text>
      <text x="1056" y="9" fill="#ededf0" text-anchor="end">55 MB</text>
    </g>
  </g>

  <!-- footer -->
  <line x1="64" y1="600" x2="1056" y2="600" stroke="#2e2e30" stroke-width="1"/>
  <text x="64" y="641" fill="#9a9aa0" font-size="14">Selected:</text>
  <text x="134" y="641" fill="#ffffff" font-size="14" font-weight="600">2.1 GB</text>
  <text x="188" y="641" fill="#9a9aa0" font-size="14">of 3.1 GB</text>
  <rect x="792" y="622" width="96" height="30" rx="7" fill="#2c2c2e"/><text x="840" y="641" fill="#dcdce0" font-size="13" text-anchor="middle">Restore last</text>
  <rect x="896" y="622" width="78" height="30" rx="7" fill="#2c2c2e"/><text x="935" y="641" fill="#dcdce0" font-size="13" text-anchor="middle">Preview</text>
  <rect x="982" y="622" width="74" height="30" rx="7" fill="#3b6ef6"/><text x="1019" y="641" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Clean</text>
