name: ci
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint shell
        run: shellcheck -S warning -e SC1090,SC1091 core/clinj.sh core/lib/*.sh bin/clinj tests/test.sh

  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run smoke + safety tests (bash 3.2 path)
        run: /bin/bash tests/test.sh
